server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: visitor-service
          uri: http://localhost:8081
          predicates:
            - Path=/visitor/**

        - id: auth-service
          uri: http://localhost:8082
          predicates:
            - Path=/auth/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka